name: Icon Preview

on:
  push:
    branches: [main, icon-preview]
    paths:
      - 'IconPreview/**'
      - '.github/workflows/icon-preview.yml'
  workflow_dispatch:

concurrency:
  group: icon-preview-${{ github.ref }}
  cancel-in-progress: true

jobs:
  screenshot:
    name: Build + screenshot Home Screen icon
    runs-on: macos-15
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest available Xcode
        run: |
          set -eo pipefail
          LATEST_XCODE=$(ls -d /Applications/Xcode*.app | sort -V | tail -1)
          echo "Selecting: $LATEST_XCODE"
          sudo xcode-select -s "$LATEST_XCODE"
          xcodebuild -version

      - name: Diagnose Icon Composer file type registration
        timeout-minutes: 3
        run: |
          set -o pipefail
          XCODE_APP=$(xcode-select -p | sed 's|/Contents/Developer||')
          echo "Searching $XCODE_APP for Icon Composer / .icon UTI declarations..."

          echo "--- .xcspec text search (previous attempt, kept for completeness) ---"
          find "$XCODE_APP" -iname "*.xcspec" 2>/dev/null | xargs grep -l -i "iconcomposer\|icon-composer" 2>/dev/null || echo "(none)"

          echo "--- strings on actool binary ---"
          strings "$XCODE_APP/Contents/Developer/usr/bin/actool" 2>/dev/null | grep -i "iconcomposer\|icon\.json\|folder\.icon\|com\.apple\..*icon" | sort -u | head -50 || echo "(no matches)"

          echo "--- strings on a small bounded set of likely-relevant binaries only (fast) ---"
          for bin in \
            "$XCODE_APP/Contents/Developer/usr/bin/actool" \
            "$XCODE_APP/Contents/SharedFrameworks/IDEFoundation.framework/IDEFoundation" \
            "$XCODE_APP/Contents/SharedFrameworks/IDEKit.framework/IDEKit" \
            "$XCODE_APP/Contents/PlugIns/IDEAssetCatalogAdapters.ideplugin/Contents/MacOS/IDEAssetCatalogAdapters"; do
            [ -f "$bin" ] || continue
            if strings "$bin" 2>/dev/null | grep -qi "iconcomposer"; then
              echo "=== MATCH: $bin ==="
              strings "$bin" 2>/dev/null | grep -i "iconcomposer" | sort -u | head -20
            else
              echo "(no match: $bin)"
            fi
          done

          echo "--- Xcode project templates: search for AppIcon.icon / iconcomposer references ---"
          find "$XCODE_APP/Contents/Developer/Library/Xcode/Templates" -iname "*.pbxproj" -o -iname "*project.pbxproj*" 2>/dev/null | xargs grep -l -i "AppIcon\.icon\|iconcomposer" 2>/dev/null || echo "(none)"
          echo "--- also search template dirs broadly for any file literally named *.icon or AppIcon.icon ---"
          find "$XCODE_APP/Contents/Developer/Library/Xcode/Templates" -iname "*.icon" -o -iname "AppIcon.icon" 2>/dev/null || echo "(none)"

          echo "diagnostic complete"
        continue-on-error: true

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: IconPreview
        run: xcodegen generate

      - name: Build for Simulator
        working-directory: IconPreview
        run: |
          set -o pipefail
          xcodebuild build \
            -project IconPreview.xcodeproj \
            -scheme IconPreviewApp \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 17,OS=latest' \
            -derivedDataPath build \
            -skipMacroValidation \
            CODE_SIGNING_ALLOWED=NO

      - name: Boot simulator, install app, screenshot Home Screen
        working-directory: IconPreview
        timeout-minutes: 5
        run: |
          set -eo pipefail
          RUNTIME_ID=$(xcrun simctl list runtimes available -j | python3 -c "import json,sys; rts=[r for r in json.load(sys.stdin)['runtimes'] if 'iOS' in r['name']]; print(rts[-1]['identifier'])")
          DEVICETYPE_ID=$(xcrun simctl list devicetypes -j | python3 -c "import json,sys; dts=[d for d in json.load(sys.stdin)['devicetypes'] if d['name']=='iPhone 17']; print(dts[0]['identifier'])")
          echo "Creating fresh simulator: runtime=$RUNTIME_ID devicetype=$DEVICETYPE_ID"
          DEVICE_ID=$(xcrun simctl create IconPreviewFresh "$DEVICETYPE_ID" "$RUNTIME_ID")
          echo "Using simulator: $DEVICE_ID"
          xcrun simctl bootstatus "$DEVICE_ID" -b
          APP_PATH=$(find build/Build/Products -maxdepth 2 -name "IconPreviewApp.app" | head -1)
          echo "App: $APP_PATH"
          xcrun simctl install "$DEVICE_ID" "$APP_PATH"
          sleep 3
          xcrun simctl io "$DEVICE_ID" screenshot icon-preview.png
          xcrun simctl terminate "$DEVICE_ID" com.makrsas.iconpreview || true

      - name: Upload screenshot
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: icon-preview-screenshot
          path: IconPreview/icon-preview.png
          retention-days: 14

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: icon-preview-logs
          path: |
            IconPreview/build/
            ~/Library/Logs/DiagnosticReports
          retention-days: 7

name: IconPreview
options:
  bundleIdPrefix: com.makrsas.iconpreview
  deploymentTarget:
    iOS: "17.0"

targets:
  IconPreviewApp:
    type: application
    platform: iOS
    sources:
      - path: IconPreviewApp
        excludes:
          - "Resources/**"
      - path: IconPreviewApp/Resources
        type: syncedFolder
      - path: IconPreviewApp/AlternateIcons.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.makrsas.iconpreview
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_ALTERNATE_APPICON_NAMES: "AppIcon-Metal AppIcon-MetalDither AppIcon-Dither AppIcon-DitherGreen"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_CFBundleDisplayName: IconPreview
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"

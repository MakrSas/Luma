name: IconPreview
options:
  bundleIdPrefix: com.makrsas.iconpreview
  deploymentTarget:
    iOS: "17.0"

targets:
  IconPreviewApp:
    type: application
    platform: iOS
    sources:
      - path: IconPreviewApp
        excludes:
          - "AppIcon.icon/**"
      - path: IconPreviewApp/AppIcon.icon
        type: folder
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.makrsas.iconpreview
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_CFBundleDisplayName: IconPreview
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
